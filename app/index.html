<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>BeeHive_VR Atlas</title>
  <style>
    /* C4 Alpha-Pfad (4.6.2026): body komplett transparent. BrowserWindow ist
       transparent:true off-screen, WGC capturet die Surface inkl. Alpha-Kanal,
       Layer-Compute-Shader schleift Alpha 1:1 durch. dashie.html-bodies haben
       eh keinen eigenen bg → Pixel ohne Widget-Inhalt landen mit alpha=0 in
       der Swapchain, sind im HMD komplett unsichtbar (vs. vorher: Magenta-bg
       + Chroma-Key, der semi-transparente Widgets nicht abbilden konnte). */
    html, body { margin: 0; padding: 0; width: 1024px; height: 768px; overflow: hidden;
                 background: rgba(0,0,0,0); font-family: sans-serif; color: #fff; }
    .panel { position: absolute; box-sizing: border-box; overflow: hidden;
             background: transparent; }
    .panel iframe { width: 100%; height: 100%; border: 0; display: block;
                    background: transparent; }

    /* Static atlas packing — these rects MUST match ATLAS_REGIONS in main.ts.
       The layer's QuadSlot.rectXYWH points at exactly these regions. Classes
       (not IDs) so the iframe inside can own id="pN" — that's what main.ts'
       syncIframes() looks up to assign target URLs. */
    .panel-1 { left:   0;   top:   0;   width: 512px;  height: 384px; }
    .panel-2 { left: 512px; top:   0;   width: 512px;  height: 384px; }
    .panel-3 { left:   0;   top: 384px; width: 1024px; height: 384px; }
  </style>
</head>
<body>
  <!-- Real dashies — the WPF process serves them on port 8723 via
       IrdashiesAdapterService. If WPF is not running yet, the iframes
       stay blank (the .fallback label peeks through). -->
  <div class="panel panel-1">
    <iframe id="p1" src="about:blank"></iframe>
  </div>
  <div class="panel panel-2">
    <iframe id="p2" src="about:blank"></iframe>
  </div>
  <div class="panel panel-3">
    <iframe id="p3" src="about:blank"></iframe>
  </div>

  <script type="module" src="/src/renderer.ts"></script>
</body>
</html>
