<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>BeeHive_VR Atlas</title>
  <style>
    /* C4 Alpha-Pfad (4.6.2026): body komplett transparent. BrowserWindow ist
       transparent:true off-screen, WGC capturet die Surface inkl. Alpha-Kanal,
       Layer-Compute-Shader schleift Alpha 1:1 durch. dashie.html-bodies haben
       eh keinen eigenen bg → Pixel ohne Widget-Inhalt landen mit alpha=0 in
       der Swapchain, sind im HMD komplett unsichtbar (vs. vorher: Magenta-bg
       + Chroma-Key, der semi-transparente Widgets nicht abbilden konnte). */
    /* C3b (4.6.2026): html/body groesse wird per setSize aus main.ts gesteuert;
       100 % laesst body mitwachsen. Iframes werden zur Laufzeit per
       executeJavaScript in #atlas-root injiziert. */
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
                 background: rgba(0,0,0,0); font-family: sans-serif; color: #fff; }
    .panel { position: absolute; box-sizing: border-box; overflow: visible;
             background: transparent; }
    .panel iframe { width: 100%; height: 100%; border: 0; display: block;
                    background: transparent; }
    /* Phase 3 (5.6.2026): Source-Name-Sticker am Quad. Sichtbar nur wenn
       Layer hoveredId == diese Source (Throttle 150 ms). Position INNERHALB
       des Quad-Rects oben links — Layer-imageRect submittet nur den Quad-
       Bereich an den OpenXR-Compositor, alles außerhalb wird nicht angezeigt.
       Abstand 6 px vom oberen Rand hält den Sticker außerhalb der maximal
       4 px Border-Zone, die der Compute-Shader im Layer überschreibt. */
    .panel .sticker { display: none; position: absolute; top: 6px; left: 6px;
                      padding: 3px 9px; font-size: 13px; font-weight: 600;
                      color: #fff; background: rgba(0, 0, 0, 0.85);
                      border-radius: 4px; white-space: nowrap;
                      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
                      pointer-events: none; }
    .panel .sticker.is-active { display: inline-block; }
  </style>
</head>
<body>
  <!-- Quads kommen dynamisch rein. main.ts/syncIframes ruft executeJavaScript
       und legt pro aktivem Source einen .panel-Container mit innerem iframe in
       #atlas-root an; Layout-Wechsel removed Container fuer nicht mehr aktive
       Quads. Statische Panels gab's bis f680beb — siehe project_handover_c3b. -->
  <div id="atlas-root"></div>

  <script type="module" src="/src/renderer.ts"></script>
</body>
</html>
